name: Compilador Calírroe Linux (Multifichero)

on:
  push:
    branches: [ main, master ]  # Compatible con ambos nombres de rama

jobs:
  build-linux:
    runs-on: ubuntu-22.04  # Versión estable y moderna de Linux

    steps:
    - name: 1. Sincronizar Repositorio
      uses: actions/checkout@v4  # Actualizado a v4

    - name: 2. Instalar Python
      uses: actions/setup-python@v5  # Actualizado a v5
      with:
        python-version: '3.10'

    - name: 3. Preparar Entorno Linux (Tkinter y X11)
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk libx11-dev

    - name: 4. Instalar Librerías Python
      run: |
        pip install pynput Pillow pyinstaller

    - name: 5. Compilar con PyInstaller
      # Asegúrate de que calirroe.py sea tu archivo principal
      run: |
        pyinstaller --noconfirm --onefile --windowed \
        --name "Calirroe-Linux" \
        --add-data "icono.ico:." \
        --add-data "icono.png:." \
        calirroe.py

    - name: 6. Subir Ejecutable Final
      uses: actions/upload-artifact@v4  # <--- LA CLAVE: Cambiado de v3 a v4
      with:
        name: Calirroe-App-Linux
        path: dist/Calirroe-Linux
